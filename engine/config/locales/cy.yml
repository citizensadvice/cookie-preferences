      analytic_cookies_summary_html: >
        <p>Mae'r cwcis hyn yn ein helpu ni i wella ein gwefan drwy ddangos sut mae pobl yn ei defnyddio. Er enghraifft, pa dudalennau sydd fwyaf poblogaidd neu lle mae pobl yn cael trafferth.</p> 
        <p>Rydym yn defnyddio teclynnau fel Google Analytics a Mouseflow i weld sut mae pobl yn defnyddio ein gwefan. Rydym yn defnyddio'r data hwn i edrych ar sut mae pobl yn defnyddio'r wefan yn gyffredinol. Nid oes gennym ddiddordeb mewn teithiau unigol.</p>
        <p>Mae rhai cwcis dadansoddeg wedi'u troi ymlaen yn ddiofyn. Os byddwch yn gwrthod cwcis dadansoddol byddant yn cael eu diffodd.</p>
