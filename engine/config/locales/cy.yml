        <p>Os byddwch chi'n derbyn y cwcis hyn, gallwch wylio fideos a bydd y chwaraewr yn cofio eich dewisiadau, fel y lefel sain. Bydd y cwcis hefyd yn cofio pa fideos rydych chi wedi eu gwylio a faint o weithiau rydych chi wedi eu gwylio. Os na dderbyniwch y cwcis hyn, fyddwch chi ddim yn gallu gwylio fideos ar ein gwefan.</p>
