    description:
      html: >
        <p>Rydym yn defnyddio cwcis hanfodol i wneud i'n gwefan weithio.</p>
        <p>Hoffem hefyd ddefnyddio rhai cwcis ychwanegol ar gyfer y canlynol:</p>
        <ul>
          <li>gweld pa gymorth sydd ei angen fwyaf ar bobl, fel y gallwn wneud ein gwefan yn well</li>
          <li>ein helpu ni i ymgyrchu dros newidiadau sy'n gwneud pethau'n decach i bawb</li>
          <li>eich gadael i chi wylio fideos ar y wefan</li>
        </ul>
        <p><a href="%{page_url}">Dysgwch fwy am sut rydym yn defnyddio cwcis ac yn cadw eich data yn ddiogel</a>.</p>
        <p>Dywedwch wrthym os ydych chi am dderbyn neu wrthod cwcis ychwanegol. Os na wnewch ddewis, bydd rhai cwcis ychwanegol yn cael eu troi ymlaen yn ddiofyn.</p>
    no_js_banner_html: >
      <p>Mae'n ymddangos bod JavaScript i ffwrdd gennych. Mae angen i chi dderbyn neu wrthod cwcis ar ein gwefan.</p>
      <p>Gan ei fod i ffwrdd, byddwn ddim ond yn defnyddio'r cwcis hanfodol y mae ein gwefan eu hangen i weithio. Mae hyn yn golygu y gallai rhai pethau, fel fideos, ddim gweithio i chi.</p>
      <p>Gallwch <a href="%{page_url}">ddysgu mwy am y cwcis rydym yn eu defnyddio</a>.</p>
