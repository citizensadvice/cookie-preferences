  cookie_preferences:
    title: Eich gosodiadau cwcis
    description: Rheolwch eich gosodiadau cwcis. Darganfyddwch sut rydyn ni'n defnyddio cwcis hanfodol i gael ein gwefan i weithio'n gywir, a dewiswch a ydych chi am dderbyn cwcis ychwanegol ar gyfer dadansoddeg a fideos.
    summary_html: >
      <p>Rydym yn ychwanegu ffeiliau testun bach o'r enw 'cwcis' at eich ffôn, tabled neu gyfrifiadur pan fyddwch chi'n defnyddio ein gwefan.</p>
      <p>Rydym yn defnyddio 2 fath o gwcis:</p>
      <ul>
        <li>cwcis hanfodol - mae'n rhaid i ni eu defnyddio er mwyn i'n gwefan weithio</li>
        <li>cwcis ychwanegol - rydym yn defnyddio'r rhain i wella ein gwefan</li>
      </ul>
      <p>Mae modd i chi <a href="%{page_url}">weld rhestr lawn o'r holl gwcis rydym yn eu defnyddio</a>.</p>
      <p>Gallwch <a href="https://cy.ico.org.uk/for-the-public/online/cookies/">ddod o hyd i fwy o wybodaeth am gwcis a sut i'w dileu ar wefan Swyddfa'r Comisiynydd Gwybodaeth</a>.</p>
      <h2>Cwcis hanfodol</h2>
      <p>Rydym yn ychwanegu cwcis hanfodol at eich dyfais cyn gynted ag y byddwch chi'n defnyddio ein gwefan. Hebddyn nhw, fydd ein gwefan ddim yn gweithio'n iawn.</p>
      <p>Gallwch rwystro cwcis hanfodol yn eich gosodiadau porwr, ond ni fyddwch yn gallu:</p>
      <ul>
        <li>cadw eich dewisiadau, fel y wlad rydych chi'n byw ynddi</li>
        <li>llenwi ffurflenni ar ein gwefan</li>
        <li>defnyddio ein gwasanaeth sgwrsio ar-lein</li>
        <li>mewngofnodi, os ydych chi'n gweithio neu'n gwirfoddoli i ni</li>
      </ul>
      <h2>Cwcis ychwanegol</h2>
      <p>Rydym hefyd yn defnyddio cwcis ychwanegol i'n helpu i wella'r wefan.</p>
      <p>Gallwch ddefnyddio'r dudalen hon i ddewis pa gwcis ychwanegol rydych chi eu heisiau. Ar ôl i chi ddewis, pwyswch y botwm 'Cadw Newidiadau'.</p>
      <p>Gallwch newid eich meddwl am gwcis ychwanegol ar unrhyw adeg drwy ddychwelyd i'r dudalen hon.</p>
